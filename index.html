    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const overdue = Object.entries(ls).map(([n,i]) => [parseInt(n), i===-1?data.length:data.length-1-i]).sort((a,b)=>b[1]-a[1]);
    const hc = {}, tc = {}; for(let i=0;i<10;i++) {hc[i]=0;tc[i]=0;}
    nums.forEach(n => { hc[Math.floor(n/10)]++; tc[n%10]++; });
    return { nums, total, freq, ls, sorted, overdue, hc, tc };
}
function predTop6(sorted) { return sorted.slice(0,6).map(([n])=>String(n).padStart(2,'0')).join(' - '); }

// Thompson Sampling prediction
function thompsonPredict(data) {
    const alpha = new Array(100).fill(1);
    data.forEach(d => {
        for (let k in d) {
            if ((k.startsWith('prize') || k === 'special') && d[k]) {
                const n = parseInt(String(d[k]).slice(-2));
                if (!isNaN(n)) alpha[n]++;
            }
        }
    });
    const probs = alpha.map((a, i) => [i, a / (a + 1)]);
    probs.sort((a, b) => b[1] - a[1]);
    return new Set(probs.slice(0, 6).map(([n]) => n));
}

function renderProvCard(provName, histData, provCode, cutoffDate, actualResult) {
    // If cutoffDate provided, only use data before that date
    if (cutoffDate) {
        histData = histData.filter(d => d.date < cutoffDate);
    }
    if (histData.length < 5) {
        return '<div class="prov-card"><h3>' + provName + '</h3><p style="color:#999;text-align:center">Không đủ dữ liệu</p></div>';
    }
    const r = calcScores(histData);
    const mx = Math.max(...Object.values(r.freq));
    const mxOd = Math.max(...r.overdue.map(x=>x[1]));
    const mxS = r.sorted[0][1];
    const mxH = Math.max(...Object.values(r.hc));
    const mxT = Math.max(...Object.values(r.tc));

    let html = '<div class="prov-card"><h3>' + provName + ' (' + r.total + ' kỳ)</h3>';

    // ENSEMBLE PREDICTION (Thompson + Statistical) with weighted scoring
    const thompsonPred = thompsonPredict(histData);
    const statPred = new Set(r.sorted.slice(0,6).map(([n])=>n));

    // Calculate weighted scores: Thompson 40% + Statistical 60%
    const ensembleScores = {};
    for (let i = 0; i < 100; i++) {
        ensembleScores[i] = 0;
    }

    // Thompson contribution (40%)
    const alpha = new Array(100).fill(1);
    histData.forEach(d => {
        for (let k in d) {
            if ((k.startsWith('prize') || k === 'special') && d[k]) {
                const n = parseInt(String(d[k]).slice(-2));
                if (!isNaN(n)) alpha[n]++;
            }
        }
    });
    for (let i = 0; i < 100; i++) {
        ensembleScores[i] += (alpha[i] / (alpha[i] + 1)) * 0.4;
    }

    // Statistical contribution (60%)
    r.sorted.forEach(([n, score], idx) => {
        ensembleScores[n] += (1 - idx/r.sorted.length) * 0.6;
    });

    // Get top 6
    const ensembleSorted = Object.entries(ensembleScores).sort((a,b) => b[1] - a[1]);
    const ensembleTop6 = ensembleSorted.slice(0, 6).map(([n]) => parseInt(n));
    const ensembleStr = ensembleTop6.map(n => String(n).padStart(2, '0')).join(' - ');

    // Show prediction
    html += '<div class="predict-box predict-main"><div class="nums">' + ensembleStr + '</div><small>Ensemble: Thompson (40%) + Statistical (60%)</small></div>';

    // Show actual result and comparison ONLY if we have real data (not 0 or empty)
    if (actualResult !== undefined && actualResult !== null && actualResult !== 0 && actualResult !== '') {
        const actualNum = parseInt(String(actualResult).slice(-2));
        if (!isNaN(actualNum) && actualNum > 0) {
            const isHit = ensembleTop6.includes(actualNum);
            const hitStyle = isHit ? 'background:#27ae60' : 'background:#e74c3c';
            html += '<div style="padding:8px;border-radius:8px;margin-top:8px;text-align:center;font-size:12px">';
            html += '<span style="color:#666">Kết quả thực: </span>';
            html += '<span style="font-weight:bold;font-size:14px">' + String(actualNum).padStart(2, '0') + '</span>';
            html += ' <span style="' + hitStyle + ';color:white;padding:2px 8px;border-radius:4px;font-size:11px">' + (isHit ? 'TRÚNG' : 'SAI') + '</span>';
            html += '</div>';
        }
    }

    // Frequency - use r.freq for counts, sort by count
    html += '<h4>Tần suất</h4><div class="grid10">';
    const freqSorted = Object.entries(r.freq).sort((a,b)=>b[1]-a[1]);
    freqSorted.forEach(([n,c]) => {
        const p = mx>0?c/mx*100:0;
        const cls = p>80?'hot':p>60?'warm':p>40?'normal':p>20?'cool':'cold';
        html += '<div class="cell '+cls+'" title="'+c+' lần"><span class="n">'+String(n).padStart(2,'0')+'</span><span class="v">'+c+'</span></div>';
    });
    html += '</div>';

    // Overdue
    html += '<h4>Lâu chưa ra</h4><div class="grid10">';
    r.overdue.forEach(([n,d]) => {
        const p = mxOd>0?d/mxOd*100:0;
        const cls = p>80?'hot':p>60?'warm':p>30?'normal':'cool';
        html += '<div class="cell '+cls+'" title="'+d+' ngày"><span class="n">'+String(n).padStart(2,'0')+'</span><span class="v">'+d+'d</span></div>';
    });
    html += '</div>';

    // Head-Tail
    html += '<h4>Đầu-Đuôi</h4><div class="headtail-wrap">';
    html += '<div><h5>Đầu</h5>';
    Object.entries(r.hc).sort((a,b)=>b[1]-a[1]).forEach(([h,c]) => {
        const p = mxH>0?c/mxH*100:0;
        html += '<div class="bar-row"><div class="bar-label">'+h+'</div><div class="bar" style="width:'+p+'%;background:hsl('+(200-p)+',70%,45%)">'+c+'</div></div>';
    });
    html += '</div><div><h5>Đuôi</h5>';
    Object.entries(r.tc).sort((a,b)=>b[1]-a[1]).forEach(([t,c]) => {
        const p = mxT>0?c/mxT*100:0;
        html += '<div class="bar-row"><div class="bar-label">'+t+'</div><div class="bar" style="width:'+p+'%;background:hsl('+(200-p)+',70%,45%)">'+c+'</div></div>';
    });
    html += '</div></div>';

    html += '</div>';
    return html;
}

// ===== ANALYSIS SECTION =====
let weekOffset = 0; // 0 = this week, 1 = next week, etc.

function prevWeek() { weekOffset--; renderAnalysis(); }
function nextWeek() { weekOffset++; renderAnalysis(); }

function renderAnalysis() {
    const SCHEDULE = {
        0: ['TGI', 'KG', 'DL'],       // Sunday
        1: ['TTP', 'DT', 'CM'],        // Monday
        2: ['BTR', 'VT', 'BL'],        // Tuesday
        3: ['DNA', 'CT', 'ST'],        // Wednesday
        4: ['TNI', 'AG', 'BTH'],       // Thursday
        5: ['VL', 'BD', 'TV'],         // Friday
        6: ['HCM', 'LA', 'BP', 'HGG']  // Saturday
    };

    const PROVINCE_MAP = {
        'TTP': 'TP. Hồ Chí Minh', 'HCM': 'TP. Hồ Chí Minh',
        'DT': 'Đồng Tháp', 'CM': 'Cà Mau', 'BTR': 'Bến Tre',
        'VT': 'Vũng Tàu', 'BL': 'Bạc Liêu', 'DNA': 'Đồng Nai',
        'CT': 'Cần Thơ', 'ST': 'Sóc Trăng', 'TNI': 'Tây Ninh',
        'AG': 'An Giang', 'BTH': 'Bình Thuận', 'VL': 'Vĩnh Long',
        'BD': 'Bình Dương', 'TV': 'Trà Vinh', 'LA': 'Long An',
        'BP': 'Bình Phước', 'HGG': 'Hậu Giang', 'TGI': 'Tiền Giang',
        'KG': 'Kiên Giang', 'DL': 'Đà Lạt'
    };

    const DAY_NAMES = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];

    // Helper: parse date string to local Date object
    function parseLocalDate(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d);
    }

    // Calculate start of week (Monday) from latest date in data
    const latestDate = ALL_DATES[ALL_DATES.length - 1];
    const latest = parseLocalDate(latestDate);
    const latestDayOfWeek = latest.getDay();
    const monday = new Date(latest);
    monday.setDate(monday.getDate() - ((latestDayOfWeek + 6) % 7) + weekOffset * 7);

    // Helper: format Date to YYYY-MM-DD without timezone issues
    function fmtDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    let weekHtml = '';
    let weekInfo = '<b>Tuần ' + fmtD(fmtDate(monday)) + ' - ';

    // Show 7 days
    for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(d.getDate() + i);
        // Format as YYYY-MM-DD without timezone issues
        const dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        const dow = d.getDay();
        const provCodes = SCHEDULE[dow] || [];
        const provNames = provCodes.map(c => PROVINCE_MAP[c] || c);

        if (i === 6) {
            weekInfo += fmtD(dateStr);
        }

        // Check if we have actual data
        const dayData = DATA.filter(dd => dd.date === dateStr);

        weekHtml += '<div style="margin-bottom:20px;padding:15px;background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)">';
        weekHtml += '<h3 style="color:#1a5276;margin-bottom:12px;font-size:15px;display:flex;align-items:center;gap:8px">';
        weekHtml += '<span style="background:#2e86c1;color:white;padding:4px 10px;border-radius:6px;font-size:13px">' + DAY_NAMES[dow] + '</span>';
        weekHtml += fmtD(dateStr) + ' - ' + provNames.join(', ');
        weekHtml += '</h3>';
        weekHtml += '<div class="three-col">';

        if (dayData.length > 0) {
            dayData.forEach(d => {
                const histData = DATA.filter(x => x.province === d.province);
                weekHtml += renderProvCard(d.province_name, histData, d.province, dateStr, d.special);
            });
        } else {
            provCodes.forEach(code => {
                const provName = PROVINCE_MAP[code] || code;
                const histData = DATA.filter(x => x.province === code);
                if (histData.length > 0) {
                    weekHtml += renderProvCard(provName, histData, code, dateStr, null);
                }
            });
        }

        weekHtml += '</div></div>';
    }

    weekInfo += '</b>';
    document.getElementById('weekInfo').innerHTML = weekInfo;
    document.getElementById('weekPredictions').innerHTML = weekHtml;
}

// ===== BACKTEST =====
function runBacktest() {
    const resultDiv = document.getElementById('backtestResult');
    const allProvinces = [...new Set(DATA.map(d => d.province))];
    const windows = [30, 90, 180, 365, 0];
    const windowLabels = ['30 ngày', '3 tháng', '6 tháng', '1 năm', 'Tất cả'];

    let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr style="background:#1a5276;color:white">';
    html += '<th style="padding:8px;text-align:left">Tỉnh</th>';
    html += '<th style="padding:8px">Kỳ test</th>';
    windowLabels.forEach(w => { html += '<th style="padding:8px">' + w + '</th>'; });
    html += '<th style="padding:8px;background:#27ae60">Ngẫu nhiên</th>';
    html += '</tr></thead><tbody>';

    allProvinces.forEach(prov => {
        const provData = DATA.filter(d => d.province === prov).sort((a,b) => a.date.localeCompare(b.date));
        if (provData.length < 50) return;

        const provName = provData[0].province_name;
        let row = '<tr style="border-bottom:1px solid #eee"><td style="padding:8px;font-weight:600">' + provName + '</td>';
        row += '<td style="padding:8px;text-align:center">' + Math.floor(provData.length * 0.2) + '</td>';

        windows.forEach((winDays) => {
            const testSize = Math.floor(provData.length * 0.2);
            const trainEnd = provData.length - testSize;
            let hits = 0;  // so ky trung it nhat 1 so
            let total = 0;

            for (let i = trainEnd; i < provData.length; i++) {
                const testDate = provData[i].date;
                let trainData = provData.filter(d => d.date < testDate);
                if (winDays > 0) {
                    const cutoff = new Date(testDate);
                    cutoff.setDate(cutoff.getDate() - winDays);
                    const cutoffStr = cutoff.toISOString().split('T')[0];
                    trainData = trainData.filter(d => d.date >= cutoffStr);
                }
                if (trainData.length < 10) continue;

                // ENSEMBLE: Thompson + Statistical
                // Thompson Sampling
                const alpha = new Array(100).fill(1);
                trainData.forEach(d => {
                    for (let k in d) {
                        if ((k.startsWith('prize') || k === 'special') && d[k]) {
                            const n = parseInt(String(d[k]).slice(-2));
                            if (!isNaN(n)) alpha[n]++;
                        }
                    }
                });
                const thompsonPred = new Set();
                const thompsonScores = alpha.map((a, idx) => [idx, a / (a + 1)]);
                thompsonScores.sort((a, b) => b[1] - a[1]);
                thompsonScores.slice(0, 6).forEach(([n]) => thompsonPred.add(n));

                // Statistical
                const r = calcScores(trainData);
                const statPred = new Set(r.sorted.slice(0,6).map(([n])=>parseInt(n)));

                // Ensemble vote
                const votes = {};
                thompsonPred.forEach(n => { votes[n] = (votes[n] || 0) + 1; });
                statPred.forEach(n => { votes[n] = (votes[n] || 0) + 1; });
                const predicted = new Set(Object.entries(votes).sort((a,b) => b[1] - a[1]).slice(0, 6).map(([n]) => parseInt(n)));

                // Chi lay 2 so cuoi GIAI DAC BIET
                const actual = provData[i];
                const specialVal = actual.special;
                if (!specialVal) continue;
                const actualNum = parseInt(String(specialVal).slice(-2));
                if (isNaN(actualNum)) continue;

                total++;
                if (predicted.has(actualNum)) hits++;
            }

            // Accuracy = so ky trung / tong so ky test
            const acc = total > 0 ? (hits / total * 100) : 0;
            const accStr = acc.toFixed(1);
            const color = acc > 10 ? '#27ae60' : acc > 7 ? '#f39c12' : '#e74c3c';
            row += '<td style="padding:8px;text-align:center;font-weight:700;color:' + color + '">' + accStr + '%</td>';
        });

        // Random baseline: 6/100 = 6%
        row += '<td style="padding:8px;text-align:center;color:#999">6.0%</td>';
        row += '</tr>';
        html += row;
    });

    // Summary row
    html += '<tr style="background:#f8f9fa;font-weight:700;border-top:2px solid #1a5276">';
    html += '<td style="padding:8px" colspan="2">Trung binh tat ca tinh</td>';

    windows.forEach((winDays) => {
        let totalHits = 0;
        let totalCount = 0;
        allProvinces.forEach(prov => {
            const provData = DATA.filter(d => d.province === prov).sort((a,b) => a.date.localeCompare(b.date));
            if (provData.length < 50) return;
            const testSize = Math.floor(provData.length * 0.2);
            const trainEnd = provData.length - testSize;
            for (let i = trainEnd; i < provData.length; i++) {
                let trainData = provData.filter(d => d.date < provData[i].date);
                if (winDays > 0) {
                    const cutoff = new Date(provData[i].date);
                    cutoff.setDate(cutoff.getDate() - winDays);
                    trainData = trainData.filter(d => d.date >= cutoff.toISOString().split('T')[0]);
                }
                if (trainData.length < 10) continue;
                const r = calcScores(trainData);
                const predicted = new Set(r.sorted.slice(0,6).map(([n])=>parseInt(n)));
                const specialVal = provData[i].special;
                if (!specialVal) continue;
                const actualNum = parseInt(String(specialVal).slice(-2));
                if (isNaN(actualNum)) continue;
                totalCount++;
                if (predicted.has(actualNum)) totalHits++;
            }
        });
        const avg = totalCount > 0 ? (totalHits / totalCount * 100).toFixed(1) : '0.0';
        html += '<td style="padding:8px;text-align:center;color:#1a5276">' + avg + '%</td>';
    });
    html += '<td style="padding:8px;text-align:center;color:#999">6.0%</td>';
    html += '</tr>';

    html += '</tbody></table></div>';

    // Legend + Analysis
    html += '<div style="margin-top:16px;padding:16px;background:#f8f9fa;border-radius:8px;font-size:12px">';
    html += '<h4 style="color:#1a5276;margin-bottom:8px">Cach doc</h4>';
    html += '<p><b>Phuong phap:</b> Du doan top 6 so co diem cao nhat, kiem tra so cuoi cua <b>Giai DAC BIET</b> co nam trong top 6 khong.</p>';
    html += '<p><b>Ngau nhien:</b> 6/100 = <b>6.0%</b> la xac suat chon dung ngau nhien 6 so tu 00-99.</p>';
    html += '<p><b>Mau sac:</b> <span style="color:#27ae60">Xanh > 10%</span> | <span style="color:#f39c12">Vang > 7%</span> | <span style="color:#e74c3c">Do <= 7%</span></p>';
    html += '</div>';

    resultDiv.innerHTML = html;
}

// Init
renderResultTable();
renderAnalysis();
runBacktest();
