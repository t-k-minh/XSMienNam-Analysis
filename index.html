<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSMN - Phân tích</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 30px; border-radius: 16px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        header h1 { font-size: 28px; color: #1a5276; margin-bottom: 5px; }
        header p { color: #666; font-size: 14px; }
        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        .card h2 { color: #1a5276; margin-bottom: 16px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .card h2::before { content: ''; width: 4px; height: 20px; background: linear-gradient(135deg, #2e86c1, #1a5276); border-radius: 2px; }
        .date-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 16px; }
        .date-nav .date { font-size: 20px; font-weight: 700; color: #1a5276; min-width: 160px; text-align: center; }
        .btn-nav { background: linear-gradient(135deg, #27ae60, #219a52); color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: all 0.2s; }
        .btn-nav:hover { transform: scale(1.05); }
        .btn-nav:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
        .table-wrap { overflow-x: auto; border: 1px solid #e0e0e0; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 6px; text-align: center; border: 1px solid #f0f0f0; font-size: 12px; white-space: nowrap; }
        th { background: linear-gradient(135deg, #2e86c1, #1a5276); color: white; font-size: 11px; }
        th:first-child { background: #1a5276; }
        td { min-width: 70px; }
        tr:hover { background: #e8f4f8; }
        .sp { color: #e74c3c; font-weight: bold; font-size: 14px; }
        .filter-bar { display: flex; gap: 6px; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 8px; margin-top: 12px; flex-wrap: wrap; }
        .filter-bar .btn-num { width: 36px; height: 36px; padding: 0; font-size: 14px; font-weight: 700; border-radius: 8px; border: 2px solid #e0e0e0; background: white; cursor: pointer; transition: all 0.2s; }
        .filter-bar .btn-num:hover { background: #e8f4f8; border-color: #2e86c1; }
        .filter-bar .btn-num.active { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; border-color: transparent; }
        .filter-bar .btn-type { padding: 8px 14px; font-size: 12px; font-weight: 600; border-radius: 8px; border: 2px solid #e0e0e0; background: white; cursor: pointer; transition: all 0.2s; }
        .filter-bar .btn-type:hover { background: #e8f4f8; border-color: #2e86c1; }
        .filter-bar .btn-type.active { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border-color: transparent; }
        .filter-bar .btn-clear { padding: 8px 14px; font-size: 12px; background: #fee2e2; color: #dc2626; border: 2px solid #fecaca; border-radius: 8px; cursor: pointer; font-weight: 600; margin-left: auto; }
        .filter-bar .btn-clear:hover { background: #fecaca; }
        .num-highlight { background: linear-gradient(135deg, #f39c12, #e67e22) !important; color: white !important; font-weight: bold; border-radius: 4px; }
        .prov-info { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; border-left: 4px solid #28a745; margin-bottom: 16px; padding: 12px; border-radius: 8px; font-size: 13px; }
        .prov-info b { color: #0d3320; }
        .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .prov-card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-top: 4px solid #2e86c1; min-width: 0; }
        .prov-card h3 { color: #1a5276; font-size: 15px; margin-bottom: 12px; text-align: center; padding-bottom: 8px; border-bottom: 2px solid #eee; }
        .prov-card h4 { color: #555; font-size: 11px; margin: 12px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .predict-box { padding: 12px; border-radius: 8px; text-align: center; color: white; margin-bottom: 8px; }
        .predict-box .nums { font-size: 18px; font-weight: 800; letter-spacing: 1px; word-break: break-all; }
        .predict-box small { font-size: 10px; opacity: 0.85; }
        .predict-main { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .grid10 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .cell { padding: 4px 2px; text-align: center; border-radius: 4px; font-weight: 600; font-size: 10px; cursor: pointer; transition: all 0.15s; }
        .cell:hover { transform: scale(1.08); }
        .cell .n { display: block; font-size: 12px; }
        .cell .v { display: block; font-size: 9px; opacity: 0.85; }
        .cell.selected { outline: 2px solid #f39c12; outline-offset: 1px; transform: scale(1.1); z-index: 10; position: relative; }
        .hot { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .warm { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .normal { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        .cool { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
        .cold { background: linear-gradient(135deg, #34495e, #2c3e50); color: white; }
        .bar-row { display: flex; align-items: center; margin-bottom: 3px; cursor: pointer; }
        .bar-row:hover { opacity: 0.85; }
        .bar-label { width: 20px; text-align: right; margin-right: 4px; font-weight: 700; font-size: 10px; }
        .bar { height: 14px; border-radius: 3px; display: flex; align-items: center; padding-left: 4px; color: white; font-size: 9px; font-weight: 600; min-width: 16px; }
        .headtail-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .headtail-wrap h5 { font-size: 10px; color: #888; margin-bottom: 4px; text-align: center; }
        footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.7); font-size: 12px; }
        @media (max-width: 1024px) { .three-col { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .grid10 { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Xổ số Miền Nam (XSMN)</h1>
        <p>22 tỉnh thành | 7100 kết quả</p>
    </header>

    <div class="card">
        <h2>Kết quả xổ số</h2>
        <div class="date-nav">
            <button class="btn-nav" id="btnPrev" onclick="prevResultDay()">&#9664;</button>
            <div class="date" id="resultDate"></div>
            <button class="btn-nav" id="btnNext" onclick="nextResultDay()">&#9654;</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead id="resultHead"></thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
        <div class="filter-bar" id="resultFilter">
            <button class="btn-type active" onclick="setFilterType('full', this)">Đầy đủ</button>
            <button class="btn-type" onclick="setFilterType('2so', this)">2 số</button>
            <button class="btn-type" onclick="setFilterType('3so', this)">3 số</button>
            <span style="margin: 0 8px; color: #ccc">|</span>
            <button class="btn-num" onclick="filterByNum(0, this)">0</button>
            <button class="btn-num" onclick="filterByNum(1, this)">1</button>
            <button class="btn-num" onclick="filterByNum(2, this)">2</button>
            <button class="btn-num" onclick="filterByNum(3, this)">3</button>
            <button class="btn-num" onclick="filterByNum(4, this)">4</button>
            <button class="btn-num" onclick="filterByNum(5, this)">5</button>
            <button class="btn-num" onclick="filterByNum(6, this)">6</button>
            <button class="btn-num" onclick="filterByNum(7, this)">7</button>
            <button class="btn-num" onclick="filterByNum(8, this)">8</button>
            <button class="btn-num" onclick="filterByNum(9, this)">9</button>
            <button class="btn-clear" onclick="clearHighlight()">Bỏ chọn</button>
        </div>
    </div>

    <div class="card">
        <h2>Phân tích dự đoán ngày</h2>
        <div class="date-nav">
            <button class="btn-nav" id="btnAnalysisPrev" onclick="prevDay()">&#9664;</button>
            <div class="date" id="analysisDate"></div>
            <button class="btn-nav" id="btnAnalysisNext" onclick="nextDay()">&#9654;</button>
        </div>
        <div class="prov-info" id="weekInfo"></div>

        <!-- SINGLE DAY PREDICTIONS -->
        <div id="weekPredictions"></div>

        <!-- BACKTEST -->
        <div style="margin-top:24px; padding-top:20px; border-top: 2px solid #eee;">
            <h2 style="color:#1a5276; font-size:18px; margin-bottom:16px; display:flex; align-items:center; gap:8px;">
                <span style="width:4px; height:20px; background:linear-gradient(135deg,#e74c3c,#c0392b); border-radius:2px;"></span>
                Kiểm tra hiệu quả (Backtest)
            </h2>
            <div id="backtestResult"></div>
        </div>
    </div>

    <footer>Dữ liệu từ xoso.com.vn | Cập nhật tự động bởi GitHub Actions</footer>
</div>

<script>
let DATA = [];
let ALL_DATES = [];

let resultDateIdx = 0;
let analysisDateIdx = 0;
let filterType = 'full';
let filterDigit = null;
let selectedNum = null;

// Load data from JSON file
async function loadData() {
    try {
        const response = await fetch('data/xsmn_web.json');
        DATA = await response.json();
        ALL_DATES = [...new Set(DATA.map(d => d.date))].sort();
        resultDateIdx = ALL_DATES.length - 1;
        analysisDateIdx = ALL_DATES.length - 1;
        document.getElementById('resultDate').textContent = 'Dang tai du lieu...';
        renderResultTable();
        renderAnalysis();
        runBacktest();
    } catch(e) {
        console.error('Error loading data:', e);
        document.getElementById('resultDate').textContent = 'Loi tai du lieu: ' + e.message;
    }
}

// Load data on page load
loadData();

function fmtD(s) { const [y,m,d] = s.split('-'); return d+'/'+m+'/'+y; }
function formatByType(val, type) {
    if (!val && val !== 0) return '-';
    const s = String(val);
    if (type === '2so') return s.slice(-2);
    if (type === '3so') return s.slice(-3);
    return s;
}
function getNumbers(data) {
    const nums = [];
    data.forEach(d => { for (let k in d) {
        if (k.startsWith('prize') || k === 'special') {
            const v = d[k];
            if (v !== null && v !== undefined && v !== 0 && v !== '') {
                const last2 = parseInt(String(v).slice(-2));
                if (!isNaN(last2)) nums.push(last2);
            }
        }
    } });
    return nums;
}
function calcScores(data) {
    const nums = getNumbers(data);
    const dates = [...new Set(data.map(d => d.date))].sort();
    const total = dates.length;
    const freq = {}, ls = {}; for(let i=0;i<100;i++) {freq[i]=0;ls[i]=-1;}
    data.forEach((d,idx) => { for(let k in d) { if(k.startsWith('prize')||k==='special') { const val = d[k]; if(val !== null && val !== '' && val !== 0) { const n = parseInt(String(val).slice(-2)); if(!isNaN(n)) { freq[n]++; ls[n]=idx; } } } } });
    const scores = {};
    for(let i=0;i<100;i++) {
        const fs = freq[i]/(total*0.2);
        const od = total-1-(ls[i]===-1?0:ls[i]);
        const os = Math.min(od/50,1);
        scores[i] = fs*0.5+os*0.5;
    }
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const overdue = Object.entries(ls).map(([n,i]) => [parseInt(n), i===-1?data.length:data.length-1-i]).sort((a,b)=>b[1]-a[1]);
    const hc = {}, tc = {}; for(let i=0;i<10;i++) {hc[i]=0;tc[i]=0;}
    nums.forEach(n => { hc[Math.floor(n/10)]++; tc[n%10]++; });
    return { nums, total, freq, ls, sorted, overdue, hc, tc };
}
function predTop6(sorted) { return sorted.slice(0,6).map(([n])=>String(n).padStart(2,'0')).join(' - '); }

// Thompson Sampling prediction
function thompsonPredict(data) {
    const alpha = new Array(100).fill(1);
    data.forEach(d => {
        for (let k in d) {
            if ((k.startsWith('prize') || k === 'special') && d[k]) {
                const n = parseInt(String(d[k]).slice(-2));
                if (!isNaN(n)) alpha[n]++;
            }
        }
    });
    const probs = alpha.map((a, i) => [i, a / (a + 1)]);
    probs.sort((a, b) => b[1] - a[1]);
    return new Set(probs.slice(0, 6).map(([n]) => n));
}

function renderProvCard(provName, histData, provCode, cutoffDate, actualResult) {
    // If cutoffDate provided, only use data before that date
    if (cutoffDate) {
        histData = histData.filter(d => d.date < cutoffDate);
    }
    if (histData.length < 5) {
        return '<div class="prov-card"><h3>' + provName + '</h3><p style="color:#999;text-align:center">Không đủ dữ liệu</p></div>';
    }
    const r = calcScores(histData);
    const mx = Math.max(...Object.values(r.freq));
    const mxOd = Math.max(...r.overdue.map(x=>x[1]));
    const mxS = r.sorted[0][1];
    const mxH = Math.max(...Object.values(r.hc));
    const mxT = Math.max(...Object.values(r.tc));

    let html = '<div class="prov-card"><h3>' + provName + ' (' + r.total + ' kỳ)</h3>';

    // ENSEMBLE PREDICTION (Thompson + Statistical) with weighted scoring
    const thompsonPred = thompsonPredict(histData);
    const statPred = new Set(r.sorted.slice(0,6).map(([n])=>n));

    // Calculate weighted scores: Thompson 40% + Statistical 60%
    const ensembleScores = {};
    for (let i = 0; i < 100; i++) {
        ensembleScores[i] = 0;
    }

    // Thompson contribution (40%)
    const alpha = new Array(100).fill(1);
    histData.forEach(d => {
        for (let k in d) {
            if ((k.startsWith('prize') || k === 'special') && d[k]) {
                const n = parseInt(String(d[k]).slice(-2));
                if (!isNaN(n)) alpha[n]++;
            }
        }
    });
    for (let i = 0; i < 100; i++) {
        ensembleScores[i] += (alpha[i] / (alpha[i] + 1)) * 0.4;
    }

    // Statistical contribution (60%)
    r.sorted.forEach(([n, score], idx) => {
        ensembleScores[n] += (1 - idx/r.sorted.length) * 0.6;
    });

    // Get top 6
    const ensembleSorted = Object.entries(ensembleScores).sort((a,b) => b[1] - a[1]);
    const ensembleTop6 = ensembleSorted.slice(0, 6).map(([n]) => parseInt(n));
    const ensembleStr = ensembleTop6.map(n => String(n).padStart(2, '0')).join(' - ');

    // Show prediction
    html += '<div class="predict-box predict-main"><div class="nums">' + ensembleStr + '</div><small>Ensemble: Thompson (40%) + Statistical (60%)</small></div>';

    // Show actual result and comparison ONLY if we have real data (not 0 or empty)
    if (actualResult !== undefined && actualResult !== null && actualResult !== 0 && actualResult !== '') {
        const actualNum = parseInt(String(actualResult).slice(-2));
        if (!isNaN(actualNum) && actualNum > 0) {
            const isHit = ensembleTop6.includes(actualNum);
            const hitStyle = isHit ? 'background:#27ae60' : 'background:#e74c3c';
            html += '<div style="padding:8px;border-radius:8px;margin-top:8px;text-align:center;font-size:12px">';
            html += '<span style="color:#666">Kết quả thực: </span>';
            html += '<span style="font-weight:bold;font-size:14px">' + String(actualNum).padStart(2, '0') + '</span>';
            html += ' <span style="' + hitStyle + ';color:white;padding:2px 8px;border-radius:4px;font-size:11px">' + (isHit ? 'TRÚNG' : 'SAI') + '</span>';
            html += '</div>';
        }
    }

    // Frequency - use r.freq for counts, sort by count
    html += '<h4>Tần suất</h4><div class="grid10">';
    const freqSorted = Object.entries(r.freq).sort((a,b)=>b[1]-a[1]);
    freqSorted.forEach(([n,c]) => {
        const p = mx>0?c/mx*100:0;
        const cls = p>80?'hot':p>60?'warm':p>40?'normal':p>20?'cool':'cold';
        html += '<div class="cell '+cls+'" title="'+c+' lần"><span class="n">'+String(n).padStart(2,'0')+'</span><span class="v">'+c+'</span></div>';
    });
    html += '</div>';

    // Overdue
    html += '<h4>Lâu chưa ra</h4><div class="grid10">';
    r.overdue.forEach(([n,d]) => {
        const p = mxOd>0?d/mxOd*100:0;
        const cls = p>80?'hot':p>60?'warm':p>30?'normal':'cool';
        html += '<div class="cell '+cls+'" title="'+d+' ngày"><span class="n">'+String(n).padStart(2,'0')+'</span><span class="v">'+d+'d</span></div>';
    });
    html += '</div>';

    // Head-Tail
    html += '<h4>Đầu-Đuôi</h4><div class="headtail-wrap">';
    html += '<div><h5>Đầu</h5>';
    Object.entries(r.hc).sort((a,b)=>b[1]-a[1]).forEach(([h,c]) => {
        const p = mxH>0?c/mxH*100:0;
        html += '<div class="bar-row"><div class="bar-label">'+h+'</div><div class="bar" style="width:'+p+'%;background:hsl('+(200-p)+',70%,45%)">'+c+'</div></div>';
    });
    html += '</div><div><h5>Đuôi</h5>';
    Object.entries(r.tc).sort((a,b)=>b[1]-a[1]).forEach(([t,c]) => {
        const p = mxT>0?c/mxT*100:0;
        html += '<div class="bar-row"><div class="bar-label">'+t+'</div><div class="bar" style="width:'+p+'%;background:hsl('+(200-p)+',70%,45%)">'+c+'</div></div>';
    });
    html += '</div></div>';

    html += '</div>';
    return html;
}

// ===== RESULT SECTION =====
function renderResultTable() {
    const date = ALL_DATES[resultDateIdx];
    document.getElementById('resultDate').textContent = fmtD(date);
    document.getElementById('btnPrev').disabled = resultDateIdx === 0;
    document.getElementById('btnNext').disabled = resultDateIdx === ALL_DATES.length - 1;
    const dayData = DATA.filter(d => d.date === date);
    if (dayData.length === 0) return;
    let headerHtml = '<tr><th>Giải</th>';
    dayData.forEach(d => { headerHtml += '<th>' + d.province_name + '</th>'; });
    headerHtml += '</tr>';
    document.getElementById('resultHead').innerHTML = headerHtml;
    const prizeRows = [['Tám','prize8'],['Bảy','prize7'],['Sáu 1','prize6_1'],['Sáu 2','prize6_2'],['Sáu 3','prize6_3'],['Năm','prize5'],['Tư 1','prize4_1'],['Tư 2','prize4_2'],['Tư 3','prize4_3'],['Tư 4','prize4_4'],['Ba 1','prize3_1'],['Ba 2','prize3_2'],['Nhì','prize2'],['Nhất','prize1'],['Đặc biệt','special']];
    let bodyHtml = '';
    prizeRows.forEach(([label, field]) => {
        bodyHtml += '<tr><td style="font-weight:600;color:#555">' + label + '</td>';
        dayData.forEach(d => {
            const val = d[field];
            const dv = formatByType(val, filterType);
            const sp = field === 'special' ? ' sp' : '';
            if (filterDigit !== null && val && String(val).slice(-2).endsWith(String(filterDigit))) {
                const f = String(val);
                bodyHtml += '<td class="'+sp+'">'+f.slice(0,-2)+'<span class="num-highlight">'+f.slice(-2)+'</span></td>';
            } else {
                bodyHtml += '<td class="'+sp+'">'+(val?dv:'-')+'</td>';
            }
        });
        bodyHtml += '</tr>';
    });
    document.getElementById('resultBody').innerHTML = bodyHtml;
}
function prevResultDay() { if (resultDateIdx > 0) { resultDateIdx--; renderResultTable(); } }
function nextResultDay() { if (resultDateIdx < ALL_DATES.length - 1) { resultDateIdx++; renderResultTable(); } }
function setFilterType(type, el) { document.querySelectorAll('#resultFilter .btn-type').forEach(b => b.classList.remove('active')); el.classList.add('active'); filterType = type; renderResultTable(); }
function filterByNum(num, el) { document.querySelectorAll('#resultFilter .btn-num').forEach(b => b.classList.remove('active')); if (filterDigit === num) { filterDigit = null; } else { filterDigit = num; el.classList.add('active'); } renderResultTable(); }
function clearHighlight() { selectedNum = null; filterDigit = null; document.querySelectorAll('#resultFilter .btn-num').forEach(b => b.classList.remove('active')); renderResultTable(); renderAnalysis(); }

// ===== ANALYSIS SECTION =====
let dayOffset = 0;

function prevDay() { dayOffset--; renderAnalysis(); }
function nextDay() { dayOffset++; renderAnalysis(); }

function renderAnalysis() {
    const SCHEDULE = {
        0: ['TGI', 'KG', 'DL'],       // Sunday
        1: ['TTP', 'DT', 'CM'],        // Monday
        2: ['BTR', 'VT', 'BL'],        // Tuesday
        3: ['DNA', 'CT', 'ST'],        // Wednesday
        4: ['TNI', 'AG', 'BTH'],       // Thursday
        5: ['VL', 'BD', 'TV'],         // Friday
        6: ['HCM', 'LA', 'BP', 'HGG']  // Saturday
    };

    const PROVINCE_MAP = {
        'TTP': 'TP. Ho Chi Minh', 'HCM': 'TP. Ho Chi Minh',
        'DT': 'Dong Thap', 'CM': 'Ca Mau', 'BTR': 'Ben Tre',
        'VT': 'Vung Tau', 'BL': 'Bac Lieu', 'DNA': 'Dong Nai',
        'CT': 'Can Tho', 'ST': 'Soc Trang', 'TNI': 'Tay Ninh',
        'AG': 'An Giang', 'BTH': 'Binh Thuan', 'VL': 'Vinh Long',
        'BD': 'Binh Duong', 'TV': 'Tra Vinh', 'LA': 'Long An',
        'BP': 'Binh Phuoc', 'HGG': 'Hau Giang', 'TGI': 'Tien Giang',
        'KG': 'Kien Giang', 'DL': 'Da Lat'
    };

    const DAY_NAMES = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];

    function parseLocalDate(dateStr) {
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d);
    }

    function fmtDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // Get today in VN timezone (UTC+7)
    const nowUTC = new Date();
    const vnNow = new Date(nowUTC.getTime() + 7 * 60 * 60 * 1000);
    const todayStr = vnNow.getUTCFullYear() + '-' + String(vnNow.getUTCMonth() + 1).padStart(2, '0') + '-' + String(vnNow.getUTCDate()).padStart(2, '0');

    // Default: show the latest data date on first load
    const latestDate = ALL_DATES[ALL_DATES.length - 1];
    const analysisTarget = parseLocalDate(latestDate);
    analysisTarget.setDate(analysisTarget.getDate() + dayOffset);

    const dateStr = fmtDate(analysisTarget);
    const dow = analysisTarget.getDay();
    const provCodes = SCHEDULE[dow] || [];
    const provNames = provCodes.map(c => PROVINCE_MAP[c] || c);

    // Update date display
    const isToday = dateStr === todayStr;
    const dateLabel = DAY_NAMES[dow] + ' ' + fmtD(dateStr) + (isToday ? ' (Hôm nay)' : '');
    document.getElementById('analysisDate').textContent = dateLabel;

    // Disable buttons at limits
    document.getElementById('btnAnalysisPrev').disabled = dayOffset <= -ALL_DATES.length + 1;
    document.getElementById('btnAnalysisNext').disabled = dayOffset >= 0;

    // Info bar
    let info = '<b>' + provNames.join(', ') + '</b>';
    document.getElementById('weekInfo').innerHTML = info;

    // Day content
    let dayHtml = '<div style="padding:10px;background:white;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)">';
    dayHtml += '<div class="three-col">';

    const dayData = DATA.filter(dd => dd.date === dateStr);
    if (dayData.length > 0) {
        dayData.forEach(d => {
            const histData = DATA.filter(x => x.province === d.province);
            dayHtml += renderProvCard(d.province_name, histData, d.province, dateStr, d.special);
        });
    } else {
        provCodes.forEach(code => {
            const provName = PROVINCE_MAP[code] || code;
            const histData = DATA.filter(x => x.province === code);
            if (histData.length > 0) {
                dayHtml += renderProvCard(provName, histData, code, dateStr, null);
            }
        });
    }

    dayHtml += '</div></div>';
    document.getElementById('weekPredictions').innerHTML = dayHtml;
}

// ===== BACKTEST =====
function runBacktest() {
    const resultDiv = document.getElementById('backtestResult');
    const allProvinces = [...new Set(DATA.map(d => d.province))];
    const windows = [30, 90, 180, 365, 0];
    const windowLabels = ['30 ngày', '3 tháng', '6 tháng', '1 năm', 'Tất cả'];

    let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr style="background:#1a5276;color:white">';
    html += '<th style="padding:8px;text-align:left">Tỉnh</th>';
    html += '<th style="padding:8px">Kỳ test</th>';
    windowLabels.forEach(w => { html += '<th style="padding:8px">' + w + '</th>'; });
    html += '<th style="padding:8px;background:#27ae60">Ngẫu nhiên</th>';
    html += '</tr></thead><tbody>';

    allProvinces.forEach(prov => {
        const provData = DATA.filter(d => d.province === prov).sort((a,b) => a.date.localeCompare(b.date));
        if (provData.length < 50) return;

        const provName = provData[0].province_name;
        let row = '<tr style="border-bottom:1px solid #eee"><td style="padding:8px;font-weight:600">' + provName + '</td>';
        row += '<td style="padding:8px;text-align:center">' + Math.floor(provData.length * 0.2) + '</td>';

        windows.forEach((winDays) => {
            const testSize = Math.floor(provData.length * 0.2);
            const trainEnd = provData.length - testSize;
            let hits = 0;  // so ky trung it nhat 1 so
            let total = 0;

            for (let i = trainEnd; i < provData.length; i++) {
                const testDate = provData[i].date;
                let trainData = provData.filter(d => d.date < testDate);
                if (winDays > 0) {
                    const cutoff = new Date(testDate);
                    cutoff.setDate(cutoff.getDate() - winDays);
                    const cutoffStr = cutoff.toISOString().split('T')[0];
                    trainData = trainData.filter(d => d.date >= cutoffStr);
                }
                if (trainData.length < 10) continue;

                // ENSEMBLE: Thompson + Statistical
                // Thompson Sampling
                const alpha = new Array(100).fill(1);
                trainData.forEach(d => {
                    for (let k in d) {
                        if ((k.startsWith('prize') || k === 'special') && d[k]) {
                            const n = parseInt(String(d[k]).slice(-2));
                            if (!isNaN(n)) alpha[n]++;
                        }
                    }
                });
                const thompsonPred = new Set();
                const thompsonScores = alpha.map((a, idx) => [idx, a / (a + 1)]);
                thompsonScores.sort((a, b) => b[1] - a[1]);
                thompsonScores.slice(0, 6).forEach(([n]) => thompsonPred.add(n));

                // Statistical
                const r = calcScores(trainData);
                const statPred = new Set(r.sorted.slice(0,6).map(([n])=>parseInt(n)));

                // Ensemble vote
                const votes = {};
                thompsonPred.forEach(n => { votes[n] = (votes[n] || 0) + 1; });
                statPred.forEach(n => { votes[n] = (votes[n] || 0) + 1; });
                const predicted = new Set(Object.entries(votes).sort((a,b) => b[1] - a[1]).slice(0, 6).map(([n]) => parseInt(n)));

                // Chi lay 2 so cuoi GIAI DAC BIET
                const actual = provData[i];
                const specialVal = actual.special;
                if (!specialVal) continue;
                const actualNum = parseInt(String(specialVal).slice(-2));
                if (isNaN(actualNum)) continue;

                total++;
                if (predicted.has(actualNum)) hits++;
            }

            // Accuracy = so ky trung / tong so ky test
            const acc = total > 0 ? (hits / total * 100) : 0;
            const accStr = acc.toFixed(1);
            const color = acc > 10 ? '#27ae60' : acc > 7 ? '#f39c12' : '#e74c3c';
            row += '<td style="padding:8px;text-align:center;font-weight:700;color:' + color + '">' + accStr + '%</td>';
        });

        // Random baseline: 6/100 = 6%
        row += '<td style="padding:8px;text-align:center;color:#999">6.0%</td>';
        row += '</tr>';
        html += row;
    });

    // Summary row
    html += '<tr style="background:#f8f9fa;font-weight:700;border-top:2px solid #1a5276">';
    html += '<td style="padding:8px" colspan="2">Trung binh tat ca tinh</td>';

    windows.forEach((winDays) => {
        let totalHits = 0;
        let totalCount = 0;
        allProvinces.forEach(prov => {
            const provData = DATA.filter(d => d.province === prov).sort((a,b) => a.date.localeCompare(b.date));
            if (provData.length < 50) return;
            const testSize = Math.floor(provData.length * 0.2);
            const trainEnd = provData.length - testSize;
            for (let i = trainEnd; i < provData.length; i++) {
                let trainData = provData.filter(d => d.date < provData[i].date);
                if (winDays > 0) {
                    const cutoff = new Date(provData[i].date);
                    cutoff.setDate(cutoff.getDate() - winDays);
                    trainData = trainData.filter(d => d.date >= cutoff.toISOString().split('T')[0]);
                }
                if (trainData.length < 10) continue;
                const r = calcScores(trainData);
                const predicted = new Set(r.sorted.slice(0,6).map(([n])=>parseInt(n)));
                const specialVal = provData[i].special;
                if (!specialVal) continue;
                const actualNum = parseInt(String(specialVal).slice(-2));
                if (isNaN(actualNum)) continue;
                totalCount++;
                if (predicted.has(actualNum)) totalHits++;
            }
        });
        const avg = totalCount > 0 ? (totalHits / totalCount * 100).toFixed(1) : '0.0';
        html += '<td style="padding:8px;text-align:center;color:#1a5276">' + avg + '%</td>';
    });
    html += '<td style="padding:8px;text-align:center;color:#999">6.0%</td>';
    html += '</tr>';

    html += '</tbody></table></div>';

    // Legend + Analysis
    html += '<div style="margin-top:16px;padding:16px;background:#f8f9fa;border-radius:8px;font-size:12px">';
    html += '<h4 style="color:#1a5276;margin-bottom:8px">Cach doc</h4>';
    html += '<p><b>Phuong phap:</b> Du doan top 6 so co diem cao nhat, kiem tra so cuoi cua <b>Giai DAC BIET</b> co nam trong top 6 khong.</p>';
    html += '<p><b>Ngau nhien:</b> 6/100 = <b>6.0%</b> la xac suat chon dung ngau nhien 6 so tu 00-99.</p>';
    html += '<p><b>Mau sac:</b> <span style="color:#27ae60">Xanh > 10%</span> | <span style="color:#f39c12">Vang > 7%</span> | <span style="color:#e74c3c">Do <= 7%</span></p>';
    html += '</div>';

    resultDiv.innerHTML = html;
}
</script>
