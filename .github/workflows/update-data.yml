name: Update data

on:
  workflow_dispatch:
  schedule:
    - cron: 35 11 * * * # 6:35 PM in Vietnam

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --no-dev --no-install-project

      - name: Update XSMN data and generate files
        run: uv run src/update_xsmn.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Updated $(date +'%Y-%m-%d')"
          git push origin main

      - name: Update GitHub Pages
        run: |
          cp readme.html /tmp/readme.html
          git checkout gh-pages
          cp /tmp/readme.html .
          cp /tmp/readme.html index.html
          git add readme.html index.html
          if git diff --quiet; then
            echo "No changes to gh-pages"
          else
            git commit -m "Update $(date +'%Y-%m-%d')"
            git push origin gh-pages
          fi
          git checkout main
